name: Update OpenLogi Latest Cask

on:
  repository_dispatch:
    types: [update-openlogi]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.0.2)"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download DMGs and compute checksums
        id: checksum
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for arch in arm64 x86_64; do
            url="https://github.com/AprilNEA/OpenLogi/releases/download/v${VERSION}/OpenLogi-v${VERSION}-macos-${arch}.dmg"
            dmg="/tmp/openlogi-${arch}.dmg"
            code=$(curl -sL -o "$dmg" -w '%{http_code}' "$url")
            if [ "$code" != "200" ]; then
              echo "error: ${arch} DMG not found at $url (HTTP $code)" >&2
              exit 1
            fi
            sha=$(sha256sum "$dmg" | awk '{print $1}')
            echo "sha256_${arch}=${sha}" >> "$GITHUB_OUTPUT"
            rm -f "$dmg"
          done

      - name: Generate cask
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p Casks

          cat > Casks/openlogi@latest.rb <<EOF
          cask "openlogi@latest" do
            arch arm: "arm64", intel: "x86_64"

            version "${VERSION}"
            sha256 arm:   "${{ steps.checksum.outputs.sha256_arm64 }}",
                   intel: "${{ steps.checksum.outputs.sha256_x86_64 }}"

            url "https://github.com/AprilNEA/OpenLogi/releases/download/v#{version}/OpenLogi-v#{version}-macos-#{arch}.dmg"
            name "OpenLogi"
            desc "Lightweight, local-first companion for Logitech HID++ peripherals"
            homepage "https://github.com/AprilNEA/OpenLogi"

            livecheck do
              url :url
              strategy :github_latest
            end

            auto_updates true
            conflicts_with cask: "openlogi"
            depends_on macos: :ventura

            app "OpenLogi.app"

            zap trash: [
              "~/.config/openlogi",
              "~/.local/share/openlogi",
              "~/Library/Caches/org.openlogi.openlogi",
              "~/Library/Preferences/org.openlogi.openlogi.plist",
              "~/Library/Saved Application State/org.openlogi.openlogi.savedState",
            ]
          end
          EOF

      - name: Commit and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/openlogi@latest.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update openlogi@latest to ${VERSION}"
          git push
